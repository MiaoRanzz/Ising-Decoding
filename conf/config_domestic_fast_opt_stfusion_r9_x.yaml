# Public, single-file config for external users.
#
# Users should only edit the fields in this file.
# Advanced/experimental fields are intentionally omitted and will be populated
# from internal defaults (and validated to prevent unsupported overrides).

# === Model selection (required) ===
model_id: 111

# === Values for evaluation. Training window is hardcoded to model receptive field. ===
distance: 3
n_rounds: 9

# === Workflow ===
workflow:
  task: train  # train, inference
  # simplify logs of inference to have only pymatching b4 and after predecoding. TODO: batch_size=1

# === Data (public surface only) ===
data:
  # Surface code orientation (public naming): O1, O2, O3, O4
  code_rotation: O2
  # Circuit-level noise model (25-parameter). This is the default public noise specification.
  # The defaults are chosen for p=0.003.
  noise_model:
    p_prep_X: 0.001000
    p_prep_Z: 0.001000

    p_meas_X: 0.010000
    p_meas_Z: 0.010000

    p_idle_cnot_X: 0.000333
    p_idle_cnot_Y: 0.000333
    p_idle_cnot_Z: 0.000333

    p_idle_spam_X: 0.000667
    p_idle_spam_Y: 0.000667
    p_idle_spam_Z: 0.000667

    p_cnot_IX: 0.000667
    p_cnot_IY: 0.000667
    p_cnot_IZ: 0.000667
    p_cnot_XI: 0.000667
    p_cnot_XX: 0.000667
    p_cnot_XY: 0.000667
    p_cnot_XZ: 0.000667
    p_cnot_YI: 0.000667
    p_cnot_YX: 0.000667
    p_cnot_YY: 0.000667
    p_cnot_YZ: 0.000667
    p_cnot_ZI: 0.000667
    p_cnot_ZX: 0.000667
    p_cnot_ZY: 0.000667
    p_cnot_ZZ: 0.000667

# === LQCloud hardware input ===
lqcloud:
  # file: load the list previously saved from result.get_memory().
  # hardware: submit the cloud circuit and decode the returned data directly.
  source: file
  backend_name: QZ01-surface_code
  # Total hardware executions requested from LQCloud.
  shots: 100  # only work when setting source: hardware
  # Number of returned hardware shots decoded one-by-one for latency. The
  # integration automatically caps this at the number of available shots.
  # Set to 0 to disable latency timing.
  latency_num_samples: 10000
  latency_warmup_iterations: 50
  measurement_file: lqcloud_measurements/measurement_5.json # only work when setting source: file
  circuit_type: memory_z
  initial_state: null
  reset: false
  mirror: true

  # lqcloud's get_memory() output is already consumed in this order by the
  # existing data_process.py. Set to reverse only if a backend explicitly
  # documents that its returned classical bit string is MSB-first.
  bit_order: as_returned

  # 0 means use every valid shot returned by hardware or found in the file.
  max_shots: 0
  batch_size: 256

  # Error rates used only to build the LQCloud Stim detector error model and
  # its PyMatching edge weights. They match circuits.py defaults.
  stim_noise:
    sq_error: 0.0011
    cz_error: 0.0064
    measure_error: 0.015
    idle_z_error: 0.0
    idle_dep_error: 0.019
