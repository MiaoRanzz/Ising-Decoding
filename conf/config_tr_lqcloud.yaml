# A config file for training models compatible with the LQCloud hardware layout.

# === Model selection (required) ===
model_id: 1  # Choose 1, 2, 3, 4, or 5

# === Values for evaluation. Training window is hardcoded to model receptive field. ===
distance: 7
n_rounds: 7

# === Workflow ===
workflow:
  task: train  # train, inference
  # simplify logs of inference to have only pymatching b4 and after predecoding. TODO: batch_size=1

# LER backend used during training validation. Inference backends are controlled
# independently below.
validation_decoder: pymatching  # pymatching or ldpc_unionfind
backend:
  pymatching: true
  ldpc_unionfind: true

# === Training ===
train:
  epochs: 30

# === Data (public surface only) ===
data:
  # Surface code orientation (public naming): O1, O2, O3, O4
  code_rotation: O2
  # Optional HE acceleration flag, surfaced here for discoverability (other HE
  # knobs live in the internal defaults). Enables the 2-partition parallel
  # spacelike homological-equivalence path; see the "HE acceleration (advanced):
  # parallel spacelike" section in README.md for the pros/cons and constraints.
  use_compile: False # Required to see the speedup from use_parallel_spacelike=True.
  use_parallel_spacelike: False
  # Circuit-level noise model (25-parameter). This is the default public noise specification.
  # The defaults are chosen for p=0.003.
  noise_model:
    # State preparation errors (2)
    p_prep_X: 0.02 # |+> state-prep fails with this probability (apply Z), 2*p/3
    p_prep_Z: 0.001 # |0> state-prep fails with this probability (apply X), 2*p/3
    # Measurement errors (2)
    p_meas_X: 0.02 # Measurement in X-basis fails with this probability (apply Z before measurement), 2*p/3
    p_meas_Z: 0.001 # Measurement in Z-basis fails with this probability (apply X before measurement), 2*p/3
    # Idle during CNOT layers / bulk (3)
    p_idle_cnot_X: 0.0003
    p_idle_cnot_Y: 0.0003
    p_idle_cnot_Z: 0.0004
    # Idle during SPAM window (ancilla prep+reset) on data qubits only (3)
    # Two-step depolarising composition (XOR of two p/3-per-axis steps): 2*p/3 - 4*p^2/9.
    p_idle_spam_X: 0.0006
    p_idle_spam_Y: 0.0006
    p_idle_spam_Z: 0.0008
    # CNOT two-qubit errors (15) - keys are p_cnot_{Pauli}{Pauli} excluding II, p/15
    p_cnot_IX: 0.00035
    p_cnot_IY: 0.00035
    p_cnot_IZ: 0.00035
    p_cnot_XI: 0.00035
    p_cnot_XX: 0.00035
    p_cnot_XY: 0.00035
    p_cnot_XZ: 0.00035
    p_cnot_YI: 0.00035
    p_cnot_YX: 0.00035
    p_cnot_YY: 0.00035
    p_cnot_YZ: 0.00035
    p_cnot_ZI: 0.00035
    p_cnot_ZX: 0.00035
    p_cnot_ZY: 0.00035
    p_cnot_ZZ: 0.00035

