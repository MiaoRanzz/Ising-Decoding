# For integrating lqcloud into nvidia's inference pipeline. By modifying config_public.

# === Model selection (required) ===
model_id: 1  # Choose 1, 2, 3, 4, or 5

# === Values for evaluation. Training window is hardcoded to model receptive field. ===
# The current LQCloud layout/circuit supports only d=3; changing this value
# alone is not enough to run another code distance.
distance: 3
# Configurable, but must be at least 2 for detector construction.
n_rounds: 9

# === Workflow ===
workflow:
  task: integrate_to_nvidia

# === Data (public surface only) ===
data:
  # Surface code orientation (public naming): O1, O2, O3, O4
  # The lqcloud d=3 layout has horizontal X boundaries and vertical Z
  # boundaries, which is NVIDIA's XH orientation (public alias O2).
  code_rotation: O2
  # Optional HE acceleration flag, surfaced here for discoverability (other HE
  # knobs live in the internal defaults). Enables the 2-partition parallel
  # spacelike homological-equivalence path; see the "HE acceleration (advanced):
  # parallel spacelike" section in README.md for the pros/cons and constraints.
  use_compile: False # Required to see the speedup from use_parallel_spacelike=True.
  use_parallel_spacelike: False
  # Circuit-level noise model (25-parameter). This inherited public setting is
  # not used to generate LQCloud hardware measurements or the LQCloud Stim DEM.
  noise_model:
    # State preparation errors (2)
    p_prep_X: 0.002 # |+> state-prep fails with this probability (apply Z), 2*p/3
    p_prep_Z: 0.002 # |0> state-prep fails with this probability (apply X), 2*p/3
    # Measurement errors (2)
    p_meas_X: 0.002 # Measurement in X-basis fails with this probability (apply Z before measurement), 2*p/3
    p_meas_Z: 0.002 # Measurement in Z-basis fails with this probability (apply X before measurement), 2*p/3
    # Idle during CNOT layers / bulk (3)
    p_idle_cnot_X: 0.001 # p/3
    p_idle_cnot_Y: 0.001 # p/3
    p_idle_cnot_Z: 0.001 # p/3
    # Idle during SPAM window (ancilla prep+reset) on data qubits only (3)
    # Two-step depolarising composition (XOR of two p/3-per-axis steps): 2*p/3 - 4*p^2/9.
    p_idle_spam_X: 0.001996 # 2*p/3 - 4*p^2/9
    p_idle_spam_Y: 0.001996 # 2*p/3 - 4*p^2/9
    p_idle_spam_Z: 0.001996 # 2*p/3 - 4*p^2/9
    # CNOT two-qubit errors (15) - keys are p_cnot_{Pauli}{Pauli} excluding II, p/15
    p_cnot_IX: 0.0002
    p_cnot_IY: 0.0002
    p_cnot_IZ: 0.0002
    p_cnot_XI: 0.0002
    p_cnot_XX: 0.0002
    p_cnot_XY: 0.0002
    p_cnot_XZ: 0.0002
    p_cnot_YI: 0.0002
    p_cnot_YX: 0.0002
    p_cnot_YY: 0.0002
    p_cnot_YZ: 0.0002
    p_cnot_ZI: 0.0002
    p_cnot_ZX: 0.0002
    p_cnot_ZY: 0.0002
    p_cnot_ZZ: 0.0002

# === LQCloud hardware input ===
lqcloud:
  # file: load the list previously saved from result.get_memory().
  # hardware: submit the cloud circuit and decode the returned data directly.
  source: file
  backend_name: QZ01-surface_code
  # Total hardware executions requested from LQCloud.
  shots: 100  # only work when setting source: hardware
  # Number of returned hardware shots decoded one-by-one for latency. The
  # integration automatically caps this at the number of available shots.
  # Set to 0 to disable latency timing.
  latency_num_samples: 10000
  latency_warmup_iterations: 50
  measurement_file: lqcloud_measurements/measurement_5.json # only work when setting source: file
  circuit_type: memory_z
  initial_state: null
  reset: false
  mirror: true

  # lqcloud's get_memory() output is already consumed in this order by the
  # existing data_process.py. Set to reverse only if a backend explicitly
  # documents that its returned classical bit string is MSB-first.
  bit_order: as_returned

  # 0 means use every valid shot returned by hardware or found in the file.
  max_shots: 0
  batch_size: 256

  # Error rates used only to build the LQCloud Stim detector error model and
  # its PyMatching edge weights. They match circuits.py defaults.
  stim_noise:
    sq_error: 0.0011
    cz_error: 0.0064
    measure_error: 0.015
    idle_z_error: 0.0
    idle_dep_error: 0.019
